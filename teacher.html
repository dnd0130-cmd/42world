<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>42월드 교사 관리소</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nanum+Gothic:wght@400;700;800&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #c8c8d8;
      background-image:
        linear-gradient(rgba(150,150,180,0.3) 1px, transparent 1px),
        linear-gradient(90deg, rgba(150,150,180,0.3) 1px, transparent 1px);
      background-size: 20px 20px;
      font-family: 'Nanum Gothic', '굴림', Gulim, sans-serif;
      image-rendering: pixelated;
      padding: 20px 0;
    }

    /* CRT 모니터 */
    .monitor {
      position: relative;
      width: 860px;
      background: #d0d0d8;
      border-radius: 20px 20px 40px 40px;
      padding: 24px 36px 56px 36px;
      border: 4px solid #888899;
      box-shadow:
        inset 0 0 30px rgba(0,0,0,0.2),
        4px 4px 0 #888,
        8px 8px 0 #666,
        0 0 0 8px #b8b8c8,
        0 0 0 12px #888899;
    }

    .screen {
      background: #b8b8cc;
      border-radius: 8px;
      padding: 16px;
      border: 3px inset #888;
      box-shadow: inset 0 0 20px rgba(0,0,0,0.3);
    }

    /* 큰 타이틀 */
    .page-title {
      font-family: 'Nanum Gothic', '굴림', Gulim, sans-serif;
      font-size: 30px;
      font-weight: 800;
      color: #f8e84a;
      text-shadow: 2px 2px 0 #8a6800, 3px 3px 0 #5a4400;
      letter-spacing: 6px;
      text-align: center;
      margin-bottom: 14px;
    }

    /* 메인 창 */
    .main-window {
      background: #c8c8e0;
      border: 3px solid #888;
      box-shadow: inset -2px -2px 0 #666, inset 2px 2px 0 #eeeef8;
    }

    .title-bar {
      background: linear-gradient(to right, #7878aa, #a8a8cc);
      padding: 4px 6px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .title-bar-text {
      font-size: 12px;
      font-weight: 800;
      color: white;
      letter-spacing: 2px;
    }

    .window-controls { display: flex; gap: 3px; }
    .win-btn {
      width: 16px; height: 14px;
      background: #c8c8d8;
      border: 2px solid; border-color: #eee #888 #888 #eee;
      font-size: 8px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-family: monospace; color: #333;
    }

    /* 3열 레이아웃 */
    .dashboard {
      display: flex;
      gap: 10px;
      padding: 10px;
    }

    /* 공통 패널 */
    .panel {
      background: #c8c8e0;
      border: 2px solid #888;
      box-shadow: inset -1px -1px 0 #666, inset 1px 1px 0 #eee;
    }

    .panel-title-bar {
      background: linear-gradient(to right, #7878aa, #a8a8cc);
      padding: 3px 5px;
      display: flex; align-items: center; justify-content: space-between;
    }

    .panel-title {
      font-size: 11px; font-weight: 800; color: white; letter-spacing: 1px;
    }

    .panel-controls { display: flex; gap: 2px; }
    .panel-btn {
      width: 12px; height: 11px; background: #c8c8d8;
      border: 1px solid; border-color: #eee #888 #888 #eee;
      font-size: 7px; display: flex; align-items: center; justify-content: center; cursor: pointer;
    }

    /* ── 학생 목록 패널 ── */
    .student-panel { width: 200px; flex-shrink: 0; }

    .student-list {
      height: 300px;
      overflow-y: auto;
      background: white;
      border: 2px solid; border-color: #888 #eee #eee #888;
      margin: 8px;
    }

    .student-list::-webkit-scrollbar { width: 14px; }
    .student-list::-webkit-scrollbar-track { background: #c8c8d8; border-left: 1px solid #888; }
    .student-list::-webkit-scrollbar-thumb {
      background: #a0a0c0;
      border: 2px solid; border-color: #eee #888 #888 #eee;
    }

    .student-item {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 6px;
      border-bottom: 1px solid #ddd;
      cursor: pointer;
    }

    .student-item:hover { background: #e8e8f8; }
    .student-item.selected { background: #8080c0; color: white; }
    .student-item.selected .student-info, .student-item.selected .student-acorn { color: white; }

    .student-avatar {
      width: 28px; height: 28px;
      image-rendering: pixelated;
      flex-shrink: 0;
    }

    .student-info { flex: 1; }
    .student-id { font-size: 8px; color: #888; font-weight: 700; }
    .student-name { font-size: 11px; font-weight: 800; color: #222; }
    .student-item.selected .student-id { color: #ddd; }

    .student-acorn { font-size: 11px; font-weight: 800; color: #333; white-space: nowrap; }

    .student-btn-row {
      display: flex; gap: 6px; padding: 6px 8px;
    }

    .add-btn, .remove-btn {
      flex: 1; height: 30px;
      font-family: 'Nanum Gothic', '굴림', Gulim, sans-serif;
      font-size: 11px; font-weight: 800;
      border: 2px solid; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 3px;
    }

    .add-btn {
      background: #228822; color: white;
      border-color: #44aa44 #115511 #115511 #44aa44;
    }

    .remove-btn {
      background: #cc2222; color: white;
      border-color: #ee4444 #881111 #881111 #ee4444;
    }

    /* ── 중간 패널 영역 ── */
    .middle-col { flex: 1; display: flex; flex-direction: column; gap: 10px; }

    /* 도토리 대시보드 */
    .dashboard-inner {
      display: flex; gap: 8px; padding: 8px;
    }

    .chart-area {
      flex: 1;
    }

    .chart-title {
      font-size: 11px; font-weight: 800; color: #333; margin-bottom: 6px; text-align: center;
    }

    .bar-chart {
      display: flex; align-items: flex-end; gap: 3px;
      height: 80px; padding: 4px 4px 0;
      background: #fffff0; border: 1px solid #ccc;
    }

    .bar-group { display: flex; flex-direction: column; align-items: center; gap: 1px; flex: 1; }

    .bar {
      width: 100%; min-width: 12px;
      image-rendering: pixelated;
    }

    .bar-label { font-size: 7px; color: #666; font-weight: 700; }

    /* 최근 내역 */
    .history-area { width: 130px; flex-shrink: 0; }
    #history-list { max-height: 160px; overflow-y: auto; }

    .history-title {
      font-size: 10px; font-weight: 800; color: #333; margin-bottom: 5px; text-align: center;
    }

    .history-item {
      display: flex; justify-content: space-between;
      font-size: 9px; padding: 2px 3px;
      border-bottom: 1px solid #ddd;
    }

    .history-item .h-name { color: #333; font-weight: 700; }
    .history-item .h-plus { color: #228822; font-weight: 800; }
    .history-item .h-minus { color: #cc2222; font-weight: 800; }

    /* 전체 현황 */
    .total-panel-body {
      display: flex; align-items: center; gap: 16px;
      padding: 10px 16px; background: #d8d8f8;
    }

    .total-text { font-size: 13px; font-weight: 800; color: #333; line-height: 1.6; }
    .total-count { font-size: 22px; font-weight: 800; color: #2a2a5a; }

    /* ── 빠른 지급 패널 ── */
    .quick-panel { width: 175px; flex-shrink: 0; }

    .quick-body { padding: 8px; }

    .quick-row {
      display: flex; align-items: center; gap: 6px;
      margin-bottom: 7px; font-size: 11px; font-weight: 800; color: #333;
    }

    .retro-select, .retro-input-sm {
      background: #fffff8;
      border: 2px solid; border-color: #888 #eee #eee #888;
      font-family: 'Nanum Gothic', '굴림', Gulim, sans-serif;
      font-size: 11px; font-weight: 700;
      padding: 1px 4px; outline: none; color: #333;
    }

    .retro-select { width: 70px; }
    .retro-input-sm { width: 50px; height: 22px; }

    /* 행동 버튼 그리드 */
    .action-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 5px; margin-bottom: 8px;
    }

    .action-btn {
      background: #d8d8f0;
      border: 2px solid; border-color: #eee #888 #888 #eee;
      font-family: 'Nanum Gothic', '굴림', Gulim, sans-serif;
      font-size: 10px; font-weight: 800; color: #333;
      padding: 6px 4px; cursor: pointer; text-align: center;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
    }

    .action-btn:hover { background: #e8e8ff; }
    .action-btn:active { border-color: #888 #eee #eee #888; transform: translate(1px,1px); }

    .action-icon { font-size: 16px; line-height: 1; }

    .bulk-btn {
      width: 100%; height: 38px;
      background: linear-gradient(180deg, #4090f0 0%, #2060c8 100%);
      border: 3px solid; border-color: #70b8ff #1040a0 #1040a0 #70b8ff;
      color: white; font-family: 'Nanum Gothic', '굴림', Gulim, sans-serif;
      font-size: 15px; font-weight: 800; cursor: pointer; letter-spacing: 2px;
      text-shadow: 1px 1px 0 #1040a0;
      box-shadow: 2px 2px 0 #082080;
    }

    .bulk-btn:hover { background: #3080e0; }
    .bulk-btn:active { transform: translate(1px,1px); box-shadow: 1px 1px 0 #082080; }

    /* ── 반응형 (갤럭시 탭 S6) ── */
    @media (max-width: 900px) {
      body { padding: 10px 0; }

      .monitor {
        width: calc(100vw - 16px);
        padding: 14px 12px 40px 12px;
        border-radius: 14px 14px 28px 28px;
      }

      .page-title { font-size: 20px; letter-spacing: 3px; margin-bottom: 10px; }

      .dashboard { flex-wrap: wrap; gap: 8px; padding: 8px; }

      /* 학생 목록: 가로 전체 + 높이 줄임 */
      .student-panel { width: 100% !important; order: 1; }
      .student-list { height: 140px; }
      .student-btn-row { padding: 4px 8px; }

      /* 중간 대시보드 */
      .middle-col { width: 100%; order: 2; }

      /* 빠른 지급: 가로 전체 */
      .quick-panel { width: 100% !important; order: 3; }

      .monitor-stand { display: none; }
      .monitor-base  { display: none; }
    }

    @media (max-width: 600px) {
      .page-title { font-size: 16px; }
      .dashboard { padding: 6px; }
    }

    /* 모니터 받침 */
    .monitor-stand {
      width: 120px; height: 20px; background: #b0b0c0;
      margin: 0 auto; border-radius: 0 0 4px 4px;
      border: 3px solid #888899; border-top: none;
    }

    .monitor-base {
      width: 200px; height: 12px; background: #a8a8b8;
      margin: 0 auto; border-radius: 2px;
      border: 3px solid #888899; border-top: none;
    }

    /* 알림 모달 */
    .modal-overlay {
      display: none; position: fixed; top: 0; left: 0;
      width: 100%; height: 100%; background: rgba(0,0,0,0.45);
      align-items: center; justify-content: center; z-index: 999;
    }

    .modal-box {
      background: #c8c8e0;
      border: 3px solid #888;
      box-shadow: inset -2px -2px 0 #666, inset 2px 2px 0 #eeeef8;
      min-width: 280px;
    }
  </style>
</head>
<body>

<div style="display:flex;flex-direction:column;align-items:center;">
  <div class="monitor">
    <div class="screen">

      <div class="page-title">42월드 교사 관리소</div>

      <div class="main-window">
        <!-- 타이틀바 -->
        <div class="title-bar">
          <span class="title-bar-text">관리자 패널</span>
          <div class="window-controls">
            <div class="win-btn">_</div>
            <div class="win-btn">□</div>
            <div class="win-btn" onclick="window.location.href='index.html'">✕</div>
          </div>
        </div>

        <!-- 3열 대시보드 -->
        <div class="dashboard">

          <!-- ① 학생 목록 -->
          <div class="panel student-panel">
            <div class="panel-title-bar">
              <span class="panel-title">학생 목록</span>
              <div class="panel-controls">
                <div class="panel-btn">_</div>
                <div class="panel-btn">✕</div>
              </div>
            </div>

            <div class="student-list" id="student-list">
              <!-- JS로 렌더링 -->
            </div>

            <div class="student-btn-row">
              <button class="add-btn" onclick="addStudent()">＋ 학생 추가</button>
              <button class="remove-btn" onclick="removeStudent()">－ 학생 제거</button>
            </div>
          </div>

          <!-- ② 중간 (대시보드 + 전체 현황) -->
          <div class="middle-col">

            <!-- 도토리 대시보드 -->
            <div class="panel">
              <div class="panel-title-bar">
                <span class="panel-title">도토리 대시보드</span>
                <div class="panel-controls"><div class="panel-btn">✕</div></div>
              </div>
              <div class="dashboard-inner">
                <!-- 막대 차트 -->
                <div class="chart-area">
                  <div class="chart-title">주간 도토리 증감</div>
                  <div class="bar-chart" id="bar-chart"></div>
                  <div style="display:flex;justify-content:space-around;padding:2px 4px;">
                    <!-- x축 레이블 JS로 -->
                  </div>
                </div>
                <!-- 최근 내역 -->
                <div class="history-area">
                  <div class="history-title">최근 도토리 내역</div>
                  <div id="history-list"></div>
                </div>
              </div>
            </div>

            <!-- 전체 도토리 현황 -->
            <div class="panel">
              <div class="panel-title-bar">
                <span class="panel-title">전체 도토리 현황</span>
                <div class="panel-controls">
                  <div class="panel-btn">_</div>
                  <div class="panel-btn">□</div>
                  <div class="panel-btn">✕</div>
                </div>
              </div>
              <div class="total-panel-body">
                <!-- 픽셀 도토리 -->
                <svg width="64" height="64" viewBox="0 0 32 32" style="image-rendering:pixelated;flex-shrink:0;">
                  <!-- 꼭지 -->
                  <rect x="14" y="1" width="4" height="2" fill="#5a3a10"/>
                  <rect x="15" y="0" width="2" height="1" fill="#5a3a10"/>
                  <rect x="13" y="2" width="6" height="1" fill="#7a5a20"/>
                  <!-- 모자 (컵) -->
                  <rect x="8"  y="3"  width="16" height="1" fill="#7a5a20"/>
                  <rect x="7"  y="4"  width="18" height="1" fill="#8a6a30"/>
                  <rect x="7"  y="5"  width="18" height="5" fill="#a07840"/>
                  <rect x="8"  y="5"  width="16" height="5" fill="#b08848"/>
                  <rect x="9"  y="5"  width="2"  height="5" fill="#c09858" opacity="0.5"/>
                  <rect x="7"  y="10" width="18" height="1" fill="#8a6a30"/>
                  <!-- 몸통 -->
                  <rect x="9"  y="11" width="14" height="1" fill="#d89040"/>
                  <rect x="8"  y="12" width="16" height="1" fill="#e8a050"/>
                  <rect x="7"  y="13" width="18" height="10" fill="#e8a850"/>
                  <rect x="8"  y="13" width="16" height="10" fill="#f0b860"/>
                  <rect x="9"  y="13" width="3"  height="10" fill="#f8c870" opacity="0.6"/>
                  <rect x="7"  y="23" width="18" height="1"  fill="#d89040"/>
                  <rect x="8"  y="24" width="16" height="2"  fill="#c88030"/>
                  <rect x="10" y="26" width="12" height="2"  fill="#b07030"/>
                  <rect x="12" y="28" width="8"  height="2"  fill="#9a6028"/>
                  <!-- 하이라이트 -->
                  <rect x="20" y="14" width="3" height="6" fill="#ffffff" opacity="0.18"/>
                </svg>
                <div>
                  <div class="total-text">전체 도토리 현황</div>
                  <div class="total-count" id="total-count">총 0개</div>
                </div>
              </div>
            </div>

          </div>

          <!-- ③ 빠른 지급 -->
          <div class="panel quick-panel">
            <div class="panel-title-bar">
              <span class="panel-title">빠른 지급</span>
              <div class="panel-controls">
                <div class="panel-btn">_</div>
                <div class="panel-btn">✕</div>
              </div>
            </div>
            <div class="quick-body">
              <div class="quick-row" style="flex-wrap:wrap;gap:4px;">
                대상학생
                <select class="retro-select" id="give-target" style="width:100%;margin-top:3px;font-size:11px;">
                  <option value="__all__">전체 학생</option>
                </select>
              </div>
              <div class="quick-row" style="gap:4px;">
                <button id="btn-give" onclick="setGiveType('give'); runQuickGive();" style="flex:1;height:26px;font-family:'Nanum Gothic','굴림',Gulim,sans-serif;font-size:11px;font-weight:800;border:2px solid;border-color:#44aa44 #115511 #115511 #44aa44;background:#228822;color:white;cursor:pointer;">＋ 지급</button>
                <button id="btn-take" onclick="setGiveType('take'); runQuickGive();" style="flex:1;height:26px;font-family:'Nanum Gothic','굴림',Gulim,sans-serif;font-size:11px;font-weight:800;border:2px solid;border-color:#888 #eee #eee #888;background:#c8c8d8;color:#333;cursor:pointer;">－ 차감</button>
                <input type="hidden" id="give-type" value="give">
              </div>
              <div class="quick-row">
                도토리 개수
                <input type="number" class="retro-input-sm" id="give-amount" value="10" min="1">
              </div>

              <div class="action-grid">
                <button class="action-btn" onclick="quickGive(10, '책 읽기')">
                  <span class="action-icon">📖</span>책 읽기
                </button>
                <button class="action-btn" onclick="quickGive(20, '발표')">
                  <span class="action-icon">🎤</span>발표
                </button>
                <button class="action-btn" onclick="quickGive(10, '청소')">
                  <span class="action-icon">🧹</span>청소
                </button>
                <button class="action-btn" onclick="quickGive(30, '규칙 준수')">
                  <span class="action-icon">⭐</span>규칙 준수
                </button>
              </div>

              <!-- 직접 입력 사유 -->
              <div style="margin-bottom:7px;">
                <div style="font-size:10px;font-weight:800;color:#333;margin-bottom:4px;">직접 입력 사유</div>
                <div style="display:flex;gap:4px;">
                  <input type="text" id="custom-reason" placeholder="사유 입력..." class="retro-input-sm" style="flex:1;width:auto;height:24px;font-size:10px;">
                  <button onclick="quickGiveCustom()" style="height:24px;padding:0 6px;font-family:'Nanum Gothic','굴림',Gulim,sans-serif;font-size:10px;font-weight:800;border:2px solid;border-color:#eee #888 #888 #eee;background:#d8d8f0;color:#333;cursor:pointer;">지급</button>
                </div>
              </div>

              <div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:0;">
                <button class="bulk-btn" onclick="bulkGive()" style="font-size:12px;letter-spacing:0;height:36px;">📦 일괄 지급</button>
                <button class="bulk-btn" onclick="window.location.href='teacher-shop.html'" style="font-size:12px;letter-spacing:0;height:36px;background:linear-gradient(180deg,#a040e0,#7020b0);border-color:#c070ff #4010a0 #4010a0 #c070ff;box-shadow:2px 2px 0 #200860;">🛒 상점 관리</button>
                <button class="bulk-btn" onclick="openGuestbookModal()" style="font-size:12px;letter-spacing:0;height:36px;background:linear-gradient(180deg,#40a060,#207040);border-color:#70d090 #104030 #104030 #70d090;box-shadow:2px 2px 0 #082018;">📖 방명록</button>
                <button class="bulk-btn" onclick="openDiaryModal()" style="font-size:12px;letter-spacing:0;height:36px;background:linear-gradient(180deg,#e07830,#b05010);border-color:#f0a060 #703000 #703000 #f0a060;box-shadow:2px 2px 0 #401800;">📔 일기 조회</button>
                <button class="bulk-btn" onclick="openVoucherApproveModal()" id="voucher-btn" style="font-size:12px;letter-spacing:0;height:36px;background:linear-gradient(180deg,#c0a020,#907000);border-color:#f0d050 #504000 #504000 #f0d050;box-shadow:2px 2px 0 #302000;">🎫 이용권 승인</button>
                <button class="bulk-btn" onclick="openPurchaseHistoryModal()" style="font-size:12px;letter-spacing:0;height:36px;background:linear-gradient(180deg,#2080c0,#105090);border-color:#60b0f0 #082050 #082050 #60b0f0;box-shadow:2px 2px 0 #041030;">🛍️ 구매 내역</button>
              </div>
            </div>
          </div>

        </div><!-- /dashboard -->
      </div><!-- /main-window -->

    </div><!-- /screen -->
  </div><!-- /monitor -->
  <div class="monitor-stand"></div>
  <div class="monitor-base"></div>
</div>

<!-- 방명록 모달 -->
<div class="modal-overlay" id="gb-modal" style="display:none;">
  <div class="modal-box" style="min-width:320px;">
    <div class="panel-title-bar">

<div class="modal-overlay" id="alert-modal" style="display:none;">
  <div class="modal-box">
    <div class="panel-title-bar">
      <span class="panel-title" id="alert-title">알림</span>

        <button onclick="closeAlert()" style="background:#c8c8d8;border:2px solid;border-color:#eee #888 #888 #eee;font-family:'Nanum Gothic','굴림',Gulim,sans-serif;font-size:12px;font-weight:700;padding:4px 18px;cursor:pointer;">확인</button>
      </div>

</div>

<script>
  const API_URL = 'https://script.google.com/macros/s/AKfycbx_gr2iDmweHonevtE0j9eAIuWUqprshP3K63Vh0DVFAe-J0az3J5W9chf4vizqs6tUtQ/exec';

  let students = [];
  let historyData = [];
  let selectedId = null;

  const weeklyData = [0, 0, 0, 0, 0, 0];
  const weekLabels = ['월', '화', '수', '목', '금', '토'];

  // ── 초기 데이터 로드 ──
  async function init() {
    await Promise.all([loadStudents(), loadLog()]);
    renderChart();
    checkPendingVouchers();
  }

  function checkPendingVouchers() {
    fetch(API_URL + '?action=getPendingVouchers')
      .then(r => r.json())
      .then(data => {
        if (data.success && data.vouchers.length > 0) {
          const btn = document.getElementById('voucher-btn');
          if (btn) {
            btn.style.background = 'linear-gradient(180deg,#e04040,#b02020)';
            btn.style.borderColor = '#ff8080 #601010 #601010 #ff8080';
            btn.textContent = '🎫 이용권 승인 (' + data.vouchers.length + ')';
          }
        }
      })
      .catch(() => {});
  }

  async function loadStudents() {
    try {
      const res = await fetch(API_URL + '?action=getAllStudents');
      const data = await res.json();
      if (data.success) {
        students = data.students.map(s => ({
          id: s.고유코드,
          name: s.이름,
          acorn: Number(s.도토리) || 0,
          gender: s.성별 === '여' ? 'f' : 'm'
        }));
        renderStudents();
      } else {
        showAlert('오류', data.error || '학생 목록을 불러오지 못했습니다.');
      }
    } catch(e) {
      showAlert('오류', '서버 연결 실패! 인터넷을 확인해주세요.');
    }
  }

  async function loadLog() {
    try {
      const res = await fetch(API_URL + '?action=getLog');
      const data = await res.json();
      if (data.success) {
        historyData = data.log.slice(0, 8).map(l => ({
          rowNum: l.rowNum,
          name: l.이름 || l.name || '',
          amount: Number(l.변화량 || l.amount) || 0,
          label: l.사유 || l.reason || l.label || ''
        }));
        renderHistory();
      }
    } catch(e) {}
  }

  // ── 학생 목록 렌더 ──
  function renderStudents() {
    const list = document.getElementById('student-list');
    list.innerHTML = '';
    students.forEach(s => {
      const div = document.createElement('div');
      div.className = 'student-item' + (s.id === selectedId ? ' selected' : '');
      div.onclick = () => {
        selectedId = s.id;
        document.getElementById('give-target').value = s.id;
        renderStudents();
      };
      div.innerHTML = `
        ${makeAvatar(s.gender)}
        <div class="student-info">
          <div class="student-id">${s.id}</div>
          <div class="student-name">${s.name}</div>
        </div>
        <div class="student-acorn">${s.acorn.toLocaleString()}개</div>
      `;
      list.appendChild(div);
    });
    syncTargetDropdown();
    updateTotal();
  }

  // ── 드롭다운 동기화 ──
  function syncTargetDropdown() {
    const sel = document.getElementById('give-target');
    const prev = sel.value;
    sel.innerHTML = '<option value="__all__">전체 학생</option>';
    students.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s.id;
      opt.textContent = s.name + ' (' + s.id + ')';
      sel.appendChild(opt);
    });
    // 선택 복원
    if ([...sel.options].some(o => o.value === prev)) sel.value = prev;
    // 드롭다운 변경 시 목록 선택도 연동
    sel.onchange = () => {
      selectedId = sel.value === '__all__' ? null : sel.value;
      renderStudentHighlight();
    };
  }

  function renderStudentHighlight() {
    document.querySelectorAll('.student-item').forEach((el, i) => {
      el.className = 'student-item' + (students[i].id === selectedId ? ' selected' : '');
    });
  }

  function makeAvatar(gender) {
    if (gender === 'f') {
      return `<svg class="student-avatar" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
        <rect x="5" y="0" width="6" height="2" fill="#1a0e04"/>
        <rect x="4" y="1" width="8" height="3" fill="#2e1c0a"/>
        <rect x="4" y="4" width="1" height="4" fill="#1a0e04"/>
        <rect x="11" y="4" width="1" height="4" fill="#1a0e04"/>
        <rect x="5" y="3" width="6" height="5" fill="#f5d0a8"/>
        <rect x="6" y="5" width="1" height="1" fill="#1a0e04"/>
        <rect x="9" y="5" width="1" height="1" fill="#1a0e04"/>
        <rect x="7" y="6" width="2" height="1" fill="#e08070"/>
        <rect x="7" y="8" width="2" height="1" fill="#f5d0a8"/>
        <rect x="5" y="9" width="6" height="5" fill="#d0a0c8"/>
        <rect x="4" y="9" width="1" height="4" fill="#d0a0c8"/>
        <rect x="11" y="9" width="1" height="4" fill="#d0a0c8"/>
        <rect x="5" y="14" width="2" height="2" fill="#f5d0a8"/>
        <rect x="9" y="14" width="2" height="2" fill="#f5d0a8"/>
      </svg>`;
    } else {
      return `<svg class="student-avatar" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
        <rect x="5" y="0" width="6" height="2" fill="#1a0e04"/>
        <rect x="4" y="1" width="8" height="3" fill="#2e1c0a"/>
        <rect x="5" y="3" width="6" height="5" fill="#f5d0a8"/>
        <rect x="6" y="5" width="1" height="1" fill="#1a0e04"/>
        <rect x="9" y="5" width="1" height="1" fill="#1a0e04"/>
        <rect x="7" y="6" width="2" height="1" fill="#e08070"/>
        <rect x="7" y="8" width="2" height="1" fill="#f5d0a8"/>
        <rect x="5" y="9" width="6" height="5" fill="#8090c8"/>
        <rect x="4" y="9" width="1" height="4" fill="#8090c8"/>
        <rect x="11" y="9" width="1" height="4" fill="#8090c8"/>
        <rect x="5" y="14" width="2" height="2" fill="#f5d0a8"/>
        <rect x="9" y="14" width="2" height="2" fill="#f5d0a8"/>
      </svg>`;
    }
  }

  // ── 막대 차트 렌더 ──
  function renderChart() {
    const chart = document.getElementById('bar-chart');
    const max = Math.max(...weeklyData);
    const colors = ['#e87830','#e87830','#50b850','#50b850','#50b850','#e87830'];
    chart.innerHTML = weeklyData.map((v, i) => {
      const h = Math.round((v / max) * 68);
      return `<div class="bar-group">
        <div class="bar" style="height:${h}px;background:${colors[i]};border:1px solid rgba(0,0,0,0.2);"></div>
        <div class="bar-label">${weekLabels[i]}</div>
      </div>`;
    }).join('');
  }

  // ── 최근 내역 렌더 ──
  function renderHistory() {
    const list = document.getElementById('history-list');
    list.innerHTML = historyData.map(h => `
      <div class="history-item" style="display:flex;align-items:center;justify-content:space-between;gap:4px;">
        <span class="h-name" style="flex:1;font-size:10px;">${h.name} ${h.label}</span>
        <span class="${h.amount > 0 ? 'h-plus' : 'h-minus'}" style="font-size:10px;">${h.amount > 0 ? '+' : ''}${h.amount}개</span>
        ${!h.label.startsWith('취소:') ? `<button onclick="cancelAcornLog(${h.rowNum},'${h.name}','${h.label}')" style="font-size:9px;padding:1px 4px;background:#cc4444;color:#fff;border:1px solid #882222;cursor:pointer;font-family:'Nanum Gothic',sans-serif;">취소</button>` : '<span style="font-size:9px;color:#aaa;">취소됨</span>'}
      </div>
    `).join('');
  }

  async function cancelAcornLog(rowNum, name, label) {
    if (!confirm(name + '의 [' + label + '] 내역을 취소하시겠어요?\n도토리가 반대로 적용됩니다.')) return;
    try {
      const res = await fetch(`${API_URL}?action=cancelAcorn&rowNum=${rowNum}`);
      const data = await res.json();
      showAlert(data.success ? '취소 완료' : '오류', data.success ? data.message : data.error);
      if (data.success) { await Promise.all([loadStudents(), loadLog()]); renderChart(); }
    } catch(e) { showAlert('오류', '서버 연결 실패'); }
  }

  // ── 전체 총합 업데이트 ──
  function updateTotal() {
    const total = students.reduce((sum, s) => sum + s.acorn, 0);
    document.getElementById('total-count').textContent = '총 ' + total.toLocaleString() + '개';
  }

  // ── 지급/차감 버튼에서 직접 실행 ──
  async function runQuickGive() {
    if (students.length === 0) {
      showAlert('오류', '학생 데이터가 없습니다. 페이지를 새로고침해주세요.');
      return;
    }
    const reason = document.getElementById('custom-reason').value.trim() || '도토리 지급/차감';
    const amount = parseInt(document.getElementById('give-amount').value) || 10;
    await quickGive(amount, reason);
  }

  // ── 빠른 지급 (행동버튼용, 개별/전체 자동 판단) ──
  async function quickGive(defaultAmt, label) {
    const amount = parseInt(document.getElementById('give-amount').value) || defaultAmt;
    const type = document.getElementById('give-type').value;
    const targetId = document.getElementById('give-target').value;
    const delta = type === 'give' ? amount : -amount;

    console.log('[quickGive]', { amount, type, targetId, delta, label, studentsCount: students.length });

    const targets = targetId === '__all__' ? students : [students.find(x => String(x.id) === String(targetId))];
    if (!targets[0]) {
      showAlert('알림', '학생 목록을 불러오지 못했습니다. 페이지를 새로고침 해주세요.');
      return;
    }

    try {
      const results = await Promise.all(targets.map(s =>
        fetch(`${API_URL}?action=giveAcorn&code=${encodeURIComponent(s.id)}&amount=${delta}&reason=${encodeURIComponent(label)}`)
          .then(r => r.json())
      ));
      console.log('[quickGive] 결과:', results);
      await Promise.all([loadStudents(), loadLog()]);
      const who = targetId === '__all__' ? '전체 학생' : targets[0].name;
      showAlert('완료', `${who}에게 [${label}] ${Math.abs(delta)}개를 ${delta > 0 ? '지급' : '차감'}했습니다.`);
    } catch(e) {
      console.error('[quickGive] 오류:', e);
      showAlert('오류', '서버 연결 실패! (' + e.message + ')');
    }
  }

  // ── 일괄 지급 (전체 항상) ──
  async function bulkGive() {
    const amount = parseInt(document.getElementById('give-amount').value) || 10;
    const type = document.getElementById('give-type').value;
    const delta = type === 'give' ? amount : -amount;

    try {
      await Promise.all(students.map(s =>
        fetch(`${API_URL}?action=giveAcorn&code=${encodeURIComponent(s.id)}&amount=${delta}&reason=${encodeURIComponent('일괄')}`)
          .then(r => r.json())
      ));
      await Promise.all([loadStudents(), loadLog()]);
      showAlert('완료', `전체 학생에게 도토리 ${Math.abs(delta)}개를 ${delta > 0 ? '지급' : '차감'}했습니다.`);
    } catch(e) {
      showAlert('오류', '서버 연결 실패!');
    }
  }

  // ── 학생 추가/제거 (추후 API 연동) ──
  function addStudent() {
    showAlert('알림', '학생 추가는 구글 시트에서 직접 해주세요.');
  }

  function removeStudent() {
    showAlert('알림', '학생 제거는 구글 시트에서 직접 해주세요.');
  }

  // ── 알림 ──
  function showAlert(title, msg) {
    document.getElementById('alert-title').textContent = title;
    document.getElementById('alert-msg').textContent = msg;
    document.getElementById('alert-modal').style.display = 'flex';
  }

  function closeAlert() {
    document.getElementById('alert-modal').style.display = 'none';
  }

  // ── 지급/차감 토글 ──
  function setGiveType(type) {
    document.getElementById('give-type').value = type;
    const btnGive = document.getElementById('btn-give');
    const btnTake = document.getElementById('btn-take');
    if (type === 'give') {
      btnGive.style.background = '#228822';
      btnGive.style.color = 'white';
      btnGive.style.borderColor = '#44aa44 #115511 #115511 #44aa44';
      btnTake.style.background = '#c8c8d8';
      btnTake.style.color = '#333';
      btnTake.style.borderColor = '#eee #888 #888 #eee';
    } else {
      btnTake.style.background = '#cc2222';
      btnTake.style.color = 'white';
      btnTake.style.borderColor = '#ee4444 #881111 #881111 #ee4444';
      btnGive.style.background = '#c8c8d8';
      btnGive.style.color = '#333';
      btnGive.style.borderColor = '#eee #888 #888 #eee';
    }
  }

  // ── 방명록 ──
  function openGuestbookModal() {
    const sel = document.getElementById('gb-target');
    sel.innerHTML = '<option value="">-- 학생 선택 --</option>';
    students.forEach(s => {
      sel.innerHTML += `<option value="${s.id}">${s.name}</option>`;
    });
    document.getElementById('gb-content').value = '';
    document.getElementById('gb-modal').style.display = 'flex';
  }
  function closeGuestbookModal() {
    document.getElementById('gb-modal').style.display = 'none';
  }
  async function submitTeacherGuestbook() {
    const toCode = document.getElementById('gb-target').value;
    const content = document.getElementById('gb-content').value.trim();
    if (!toCode) { showAlert('알림', '학생을 선택하세요.'); return; }
    if (!content) { showAlert('알림', '내용을 입력하세요.'); return; }
    try {
      const res = await fetch(`${API_URL}?action=writeGuestbook&fromCode=teacher&toCode=${encodeURIComponent(toCode)}&content=${encodeURIComponent(content)}&authorType=교사`);
      const data = await res.json();
      if (data.success) { closeGuestbookModal(); showAlert('완료', data.message); }
      else showAlert('오류', data.error);
    } catch(e) { showAlert('오류', '서버 연결 실패!'); }
  }

  // ── 직접 입력 사유 지급 ──
  async function quickGiveCustom() {
    const reason = document.getElementById('custom-reason').value.trim();
    if (!reason) { showAlert('알림', '사유를 입력해주세요.'); return; }
    await quickGive(parseInt(document.getElementById('give-amount').value) || 10, reason);
    document.getElementById('custom-reason').value = '';
  }

  // ── 다이어리 조회 ──
  function openDiaryModal() {
    const sel = document.getElementById('diary-target');
    sel.innerHTML = '<option value="">-- 학생 선택 --</option>';
    students.forEach(s => {
      sel.innerHTML += `<option value="${s.id}">${s.name} (${s.id})</option>`;
    });
    document.getElementById('diary-results').innerHTML = '<div style="padding:20px;text-align:center;font-size:11px;color:#888;font-weight:700;">학생을 선택하고 조회 버튼을 눌러주세요.</div>';
    document.getElementById('diary-modal').style.display = 'flex';
  }

  function closeDiaryModal() {
    document.getElementById('diary-modal').style.display = 'none';
  }

  function openVoucherApproveModal() {
    document.getElementById('voucher-approve-modal').style.display = 'flex';
    loadPendingVouchers();
  }
  function closeVoucherApproveModal() {
    document.getElementById('voucher-approve-modal').style.display = 'none';
  }
  function loadPendingVouchers() {
    const div = document.getElementById('pending-voucher-list');
    div.innerHTML = '<div style="text-align:center;color:#aaa;font-size:11px;padding:12px;">불러오는 중...</div>';
    fetch(API_URL + '?action=getPendingVouchers')
      .then(r => r.json())
      .then(data => {
        if (!data.success || data.vouchers.length === 0) {
          div.innerHTML = '<div style="text-align:center;color:#aaa;font-size:11px;padding:16px;">승인 대기 중인 이용권이 없어요 ✅</div>';
          document.getElementById('voucher-btn').style.background = 'linear-gradient(180deg,#c0a020,#907000)';
          return;
        }
        document.getElementById('voucher-btn').style.background = 'linear-gradient(180deg,#e04040,#b02020)';
        div.innerHTML = '';
        data.vouchers.forEach(v => {
          div.innerHTML += `
            <div style="background:#fffde8;border:2px solid #ccaa00;padding:8px;margin-bottom:6px;border-radius:2px;">
              <div style="font-weight:bold;font-size:12px;">🎫 ${v.품목}</div>
              <div style="font-size:10px;color:#555;margin-top:2px;">학생: ${v.이름} (${v.학번})</div>
              <div style="font-size:10px;color:#888;">신청일: ${new Date(v.신청일).toLocaleString()}</div>
              <div style="display:flex;gap:6px;margin-top:6px;">
                <button onclick="approveVoucher('${v.id}', '${v.이름}', '${v.품목}')"
                  style="padding:4px 12px;background:#2a7a2a;color:#fff;border:2px solid #1a5a1a;font-size:10px;font-weight:700;cursor:pointer;">
                  ✅ 승인
                </button>
                <button onclick="rejectVoucher('${v.id}', '${v.이름}', '${v.품목}')"
                  style="padding:4px 12px;background:#aa2222;color:#fff;border:2px solid #881111;font-size:10px;font-weight:700;cursor:pointer;">
                  ❌ 거절
                </button>
              </div>
            </div>`;
        });
      })
      .catch(() => { div.innerHTML = '<div style="color:#cc2222;font-size:11px;padding:8px;">불러오기 실패</div>'; });
  }
  function approveVoucher(id, name, item) {
    if (!confirm(name + '의 [' + item + '] 이용권을 승인하시겠어요?')) return;
    fetch(`${API_URL}?action=approveVoucher&id=${encodeURIComponent(id)}`)
      .then(r => r.json())
      .then(data => {
        showAlert(data.success ? '승인 완료' : '오류', data.success ? data.message : (data.error || '실패!'));
        if (data.success) loadPendingVouchers();
      })
      .catch(() => showAlert('오류', '서버 연결 실패!'));
  }

  function rejectVoucher(id, name, item) {
    if (!confirm(name + '의 [' + item + '] 이용권 신청을 거절하시겠어요?')) return;
    fetch(`${API_URL}?action=rejectVoucher&id=${encodeURIComponent(id)}`)
      .then(r => r.json())
      .then(data => {
        showAlert(data.success ? '거절 완료' : '오류', data.success ? data.message : (data.error || '실패!'));
        if (data.success) loadPendingVouchers();
      })
      .catch(() => showAlert('오류', '서버 연결 실패!'));
  }

  function openPurchaseHistoryModal() {
    document.getElementById('purchase-history-modal').style.display = 'flex';
    const sel = document.getElementById('purchase-target');
    sel.innerHTML = '<option value="">-- 학생 선택 --</option>';
    students.forEach(s => {
      sel.innerHTML += `<option value="${s.id}">${s.name} (${s.id})</option>`;
    });
  }
  function closePurchaseHistoryModal() {
    document.getElementById('purchase-history-modal').style.display = 'none';
  }
  async function loadPurchaseHistory() {
    const code = document.getElementById('purchase-target').value;
    if (!code) { showAlert('알림', '학생을 선택하세요.'); return; }
    const div = document.getElementById('purchase-history-list');
    div.innerHTML = '<div style="text-align:center;color:#aaa;font-size:11px;padding:16px;">불러오는 중...</div>';
    try {
      const res = await fetch(`${API_URL}?action=getPurchaseHistory&code=${encodeURIComponent(code)}`);
      const data = await res.json();
      if (!data.success) { div.innerHTML = '<div style="color:#cc2222;font-size:11px;padding:8px;">' + data.error + '</div>'; return; }
      if (data.history.length === 0) {
        div.innerHTML = '<div style="text-align:center;color:#aaa;font-size:11px;padding:16px;">' + data.이름 + ' 학생의 구매 내역이 없어요.</div>';
        return;
      }
      div.innerHTML = data.history.map(h => `
        <div style="display:flex;justify-content:space-between;padding:5px 4px;border-bottom:1px solid #ddd;font-size:11px;">
          <span style="color:#333;font-weight:700;">🛍️ ${h.품목}</span>
          <span style="color:#cc2222;font-weight:800;">${h.도토리}개</span>
          <span style="color:#888;">${new Date(h.날짜).toLocaleDateString()}</span>
        </div>`).join('');
    } catch(e) { div.innerHTML = '<div style="color:#cc2222;font-size:11px;padding:8px;">서버 연결 실패</div>'; }
  }

  async function loadDiaries() {
    const code = document.getElementById('diary-target').value;
    if (!code) { showAlert('알림', '학생을 선택하세요.'); return; }
    const resultsEl = document.getElementById('diary-results');
    resultsEl.innerHTML = '<div style="padding:20px;text-align:center;font-size:11px;color:#888;font-weight:700;">불러오는 중...</div>';
    try {
      const res = await fetch(`${API_URL}?action=getDiaries`);
      const data = await res.json();
      if (!data.success) { resultsEl.innerHTML = `<div style="padding:16px;font-size:11px;color:#cc2222;font-weight:700;">오류: ${data.error || '불러오기 실패'}</div>`; return; }
      const all = data.diaries || [];
      // 선택한 학생 코드로 필터링
      const entries = all.filter(e => (e.학번 || e.고유코드 || e.code || '') === code);
      const emojiMap = { '행복':'😊', '신남':'🤩', '평범':'😐', '피곤':'😴', '슬픔':'😢', '화남':'😤' };
      if (entries.length === 0) {
        resultsEl.innerHTML = '<div style="padding:20px;text-align:center;font-size:11px;color:#888;font-weight:700;">아직 작성한 다이어리가 없어요.</div>';
        return;
      }
      resultsEl.innerHTML = entries.map(e => `
        <div style="padding:10px 12px;border-bottom:1px solid #ddd;">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">
            <span style="font-size:16px;">${emojiMap[e.감정 || e.emotion] || '📝'}</span>
            <span style="font-size:10px;font-weight:800;color:#555;">${e.날짜 || ''}</span>
            <span style="font-size:11px;font-weight:800;color:#333;">${e.감정 || ''}</span>
          </div>
          <div style="font-size:11px;color:#333;font-weight:700;line-height:1.5;white-space:pre-wrap;">${e.내용 || ''}</div>
        </div>
      `).join('');
    } catch(e) {
      resultsEl.innerHTML = '<div style="padding:16px;font-size:11px;color:#cc2222;font-weight:700;">서버 연결 실패!</div>';
    }
  }

  // ── 초기화 ──
  init();
</script>

</body>
</html>
